openapi: 3.0.3
info:
  title: UNB Parking Digital Twin API
  description: >
    Contract for the UNB Saint John parking digital twin **as used by the web app** (React client),
    plus operational endpoints (health, Redis cache status) and the Earth Engine tile proxy used by the map.
    The backend still exposes additional admin/data routes (e.g. CRUD for buildings, students, historical proxy
    rows, JSON prediction endpoints under `/api/prediction`); those are intentionally omitted here.
  version: 0.4.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Local development

# Default: no auth. Override with `security: [bearerAuth: []]` where JWT is required.
security:
  - {}

tags:
  - name: Health
    description: Liveness and service identity.
  - name: Cache
    description: Optional Redis cache status.
  - name: Earth Engine
    description: Map imagery and campus section GeoJSON.
  - name: Parking lots
    description: Lots, forecast, and recommendations.
  - name: Parking spots
    description: Spot listing and occupancy apply endpoints.
  - name: Simulator
    description: In-process simulator flags for map mode.
  - name: Parking spot logs
    description: Historical spot status changes.
  - name: Classes
    description: Course catalog.
  - name: Class schedule
    description: Student enrollments.
  - name: Buildings
    description: Campus buildings and map markers.
  - name: Auth
    description: Register and login.
  - name: Users
    description: Current user profile and schedule.
  - name: What-if
    description: Event impact vs baseline occupancy.

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /api/cache/health:
    get:
      tags: [Cache]
      summary: Redis cache connectivity and stats
      operationId: getCacheHealth
      responses:
        "200":
          description: Completed (may report unhealthy Redis)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheHealthResponse"
        "500":
          description: Error querying cache layer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheHealthErrorResponse"

  /api/earth-engine/sections:
    get:
      tags: [Earth Engine]
      summary: Parking section polygons (GeoJSON)
      operationId: getEarthEngineSections
      responses:
        "200":
          description: GeoJSON FeatureCollection
          content:
            application/json:
              schema:
                type: object
        "502":
          description: Earth Engine or asset error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/earth-engine/tiles:
    get:
      tags: [Earth Engine]
      summary: Earth Engine tile URL template
      operationId: getEarthEngineTileUrl
      parameters:
        - name: asset
          in: query
          schema:
            type: string
            default: unbsj
      responses:
        "200":
          description: Tile URL template for Leaflet
          content:
            application/json:
              schema:
                type: object
                required: [tileUrl]
                properties:
                  tileUrl:
                    type: string

  /api/earth-engine/tiles/{z}/{x}/{y}:
    get:
      tags: [Earth Engine]
      summary: Proxied map tile (PNG)
      operationId: getEarthEngineTile
      parameters:
        - name: z
          in: path
          required: true
          schema: { type: integer }
        - name: x
          in: path
          required: true
          schema: { type: integer }
        - name: y
          in: path
          required: true
          schema: { type: integer }
        - name: asset
          in: query
          required: true
          schema: { type: string }
        - name: min
          in: query
          schema: { type: number }
        - name: max
          in: query
          schema: { type: number }
      responses:
        "200":
          description: PNG tile
          content:
            image/png:
              schema:
                type: string
                format: binary
        "400":
          description: Missing asset or invalid z/x/y
        "502":
          description: Earth Engine error

  /api/parking-lots:
    get:
      tags: [Parking lots]
      summary: List parking lots (optional distance/occupancy per building)
      operationId: listParkingLots
      parameters:
        - name: buildingId
          in: query
          description: When set, each lot includes distanceMeters, freeSpots, occupancyPercent (sorted by distance).
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lots (plain or with distance fields)
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: "#/components/schemas/ParkingLot"
                    - $ref: "#/components/schemas/ParkingLotWithDistance"

  /api/parking-lots/forecast:
    get:
      tags: [Parking lots]
      summary: Campus parking forecast for a date/time (Moncton-local; defaults to now)
      operationId: getParkingLotsForecast
      parameters:
        - name: date
          in: query
          description: YYYY-MM-DD
          schema: { type: string }
        - name: time
          in: query
          description: HH:mm
          schema: { type: string }
      responses:
        "200":
          description: Forecast payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingForecastResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/parking-lots/recommendation:
    post:
      tags: [Parking lots]
      summary: Recommend closest eligible lot and spot for a building
      operationId: recommendParking
      security:
        - {}
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendParkingRequest"
      responses:
        "200":
          description: Recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingRecommendationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No suitable lot/spot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/parking-lots/{id}:
    get:
      tags: [Parking lots]
      summary: Get parking lot by ID
      operationId: getParkingLotById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Parking lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingLot"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/parking-lots/{id}/spots:
    get:
      tags: [Parking lots]
      summary: List spots in a lot
      operationId: listParkingLotSpots
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: section
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Spots in the lot
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingSpot"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/parking-spots:
    get:
      tags: [Parking spots]
      summary: List parking spots
      operationId: listParkingSpots
      parameters:
        - name: parkingLotId
          in: query
          schema:
            type: string
            format: uuid
        - name: section
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Parking spots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingSpot"

  /api/parking-spots/apply-scenario:
    post:
      tags: [Parking spots]
      summary: Apply occupancy snapshot for scenario date/time (Moncton)
      operationId: applyParkingScenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, time]
              properties:
                date:
                  type: string
                  example: "2026-03-15"
                time:
                  type: string
                  example: "11:00"
                deterministic:
                  type: boolean
      responses:
        "200":
          description: Apply result counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: integer }
                  kTotal: { type: integer }
                  totalSpots: { type: integer }
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/parking-spots/apply-live:
    post:
      tags: [Parking spots]
      summary: Apply occupancy for “now” and set simulator to live
      operationId: applyParkingLive
      responses:
        "200":
          description: Apply result counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: integer }
                  kTotal: { type: integer }
                  totalSpots: { type: integer }
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/parking-spots/{id}/status:
    patch:
      tags: [Parking spots]
      summary: Update spot occupied/empty
      operationId: updateParkingSpotStatus
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateParkingSpotStatus"
      responses:
        "200":
          description: Updated spot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/simulator:
    get:
      tags: [Simulator]
      summary: Simulator play/pause and map mode
      operationId: getSimulatorState
      responses:
        "200":
          description: Current simulator state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulatorState"
    post:
      tags: [Simulator]
      summary: Set paused and/or map mode
      operationId: setSimulatorState
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulatorStatePatch"
      responses:
        "200":
          description: Updated simulator state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulatorState"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/parking-spot-logs:
    get:
      tags: [Parking spot logs]
      summary: List spot status logs
      operationId: listParkingSpotLogs
      parameters:
        - name: parkingSpotId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Status change logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingSpotLog"

  /api/classes:
    get:
      tags: [Classes]
      summary: List courses (catalog)
      operationId: listClasses
      responses:
        "200":
          description: Course catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"

  /api/class-schedule:
    post:
      tags: [Class schedule]
      summary: Enroll current user’s student in a class
      operationId: createClassSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassSchedule"
      responses:
        "201":
          description: Enrollment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassSchedule"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/class-schedule/{id}:
    delete:
      tags: [Class schedule]
      summary: Drop enrollment
      operationId: deleteClassSchedule
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: No content
        "404":
          $ref: "#/components/responses/NotFound"

  /api/buildings:
    get:
      tags: [Buildings]
      summary: List buildings
      operationId: listBuildings
      responses:
        "200":
          description: Campus buildings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Building"

  /api/buildings/map-markers/geojson:
    get:
      tags: [Buildings]
      summary: Building markers (GeoJSON Points)
      operationId: getBuildingMapMarkersGeoJson
      parameters:
        - name: debug
          in: query
          schema: { type: string }
      responses:
        "200":
          description: GeoJSON FeatureCollection of building points
          content:
            application/json:
              schema:
                type: object
        "502":
          description: Earth Engine or merge error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login (JWT)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful; returns JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /api/users/me:
    get:
      tags: [Users]
      summary: Current user (+ linked student)
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated
    patch:
      tags: [Users]
      summary: Update current user profile
      operationId: patchMe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMeRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Not authenticated
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users/me/arrival-recommendation:
    get:
      tags: [Users]
      summary: Full-day arrival plan for a calendar date
      operationId: getMyArrivalRecommendation
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: stateMode
          in: query
          description: current (live occupancy) or predicted
          schema:
            type: string
            enum: [current, predicted]
            default: current
        - name: eventSize
          in: query
          schema:
            type: string
            enum: [none, small, medium, large]
            default: none
      responses:
        "200":
          description: Day arrival plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DayArrivalPlanResponse"
        "400":
          description: Invalid or missing parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
        "404":
          description: Could not build a plan for this user/date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/users/me/schedule:
    get:
      tags: [Users]
      summary: Enrolled sections for the linked student
      operationId: getMySchedule
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Schedule rows with embedded courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleEntryWithCourse"
        "401":
          description: Not authenticated

  /api/what-if:
    get:
      tags: [What-if]
      summary: Campus-wide baseline vs event scenario (optional auth)
      description: >
        Query params `date`, `time`, `eventSize` (none|small|medium|large), `useEnrollment` (default true).
        Defaults to current Moncton date/time when omitted.
      operationId: getWhatIf
      security:
        - {}
        - bearerAuth: []
      responses:
        "200":
          description: Baseline vs scenario snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatIfResponse"
        "400":
          description: Invalid date or time
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Health:
      type: object
      properties:
        ok: { type: boolean }
        service: { type: string }

    CacheHealthResponse:
      type: object
      properties:
        healthy: { type: boolean }
        stats:
          type: object
          properties:
            enabled: { type: boolean }
            redisUrl: { type: string, nullable: true }
        timestamp: { type: string, format: date-time }

    CacheHealthErrorResponse:
      type: object
      properties:
        healthy: { type: boolean, example: false }
        error: { type: string }
        timestamp: { type: string, format: date-time }

    Error:
      type: object
      properties:
        error: { type: string }

    UserRole:
      type: string
      enum: [staff, student, phd_candidate]

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        role: { $ref: "#/components/schemas/UserRole" }
        resident: { type: boolean }
        disabled: { type: boolean }

    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        name: { type: string, minLength: 1 }
        role:
          type: string
          enum: [staff, student, phd_candidate]
          default: student
        resident: { type: boolean, default: false }
        disabled: { type: boolean, default: false }
        studentId:
          type: string
          description: Required when role is student or phd_candidate

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      properties:
        user: { $ref: "#/components/schemas/User" }
        token: { type: string }

    MeResponse:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            student:
              nullable: true
              type: object
              properties:
                id: { type: string, format: uuid }
                studentId: { type: string }
                email: { type: string }
                name: { type: string }
                year: { type: integer, nullable: true }

    PatchMeRequest:
      type: object
      description: At least one field required.
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string, format: email }
        role: { $ref: "#/components/schemas/UserRole" }
        resident: { type: boolean }
        disabled: { type: boolean }
        studentId: { type: string }

    ParkingLot:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        campus: { type: string }
        capacity: { type: integer, minimum: 0 }
        imageUrl: { type: string, format: uri, nullable: true }
        createdAt: { type: string, format: date-time }

    ParkingLotWithDistance:
      allOf:
        - $ref: "#/components/schemas/ParkingLot"
        - type: object
          properties:
            distanceMeters: { type: number }
            freeSpots: { type: integer }
            occupancyPercent: { type: number }

    RecommendParkingRequest:
      type: object
      required: [buildingId]
      properties:
        buildingId: { type: string, format: uuid }
        stateMode:
          type: string
          enum: [current, predicted]
          default: current
        predictedFreeSpotsByLotId:
          type: object
          additionalProperties: { type: integer, minimum: 0 }
        predictedSpotStatusByLotId:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: string
              enum: [empty, occupied]

    ParkingRecommendationResponse:
      type: object
      properties:
        lot: { $ref: "#/components/schemas/ParkingLot" }
        spot: { $ref: "#/components/schemas/ParkingSpot" }
        distanceMeters: { type: number }
        freeSpotsInSelectedLot: { type: integer }
        occupancyPercent: { type: integer }
        evaluatedMode:
          type: string
          enum: [current, predicted]

    ParkingForecastLotRow:
      type: object
      properties:
        parkingLotId: { type: string }
        name: { type: string }
        spotCount: { type: integer }
        predictedOccupied: { type: integer }
        predictedFree: { type: integer }
        predictedOccupancyPercent: { type: number }

    ParkingForecastInsights:
      type: object
      description: Diagnostic fields for the forecast panel; may grow over time.
      additionalProperties: true

    ParkingForecastResponse:
      type: object
      properties:
        date: { type: string }
        time: { type: string }
        timezone: { type: string }
        signalSource:
          type: string
          enum: [heuristic_profile, data_driven_model]
        modelNote: { type: string }
        campusPredictedOccupancyPercent: { type: number }
        kTotal: { type: integer }
        totalSpots: { type: integer }
        lots:
          type: array
          items: { $ref: "#/components/schemas/ParkingForecastLotRow" }
        insights: { $ref: "#/components/schemas/ParkingForecastInsights" }

    SimulatorState:
      type: object
      properties:
        paused: { type: boolean }
        mapMode:
          type: string
          enum: [live, scenario]
        scenarioDate: { type: string, nullable: true }
        scenarioTime: { type: string, nullable: true }

    SimulatorStatePatch:
      type: object
      properties:
        paused: { type: boolean }
        mapMode:
          type: string
          enum: [live, scenario]
        scenarioDate: { type: string, nullable: true }
        scenarioTime: { type: string, nullable: true }

    ParkingSpot:
      type: object
      properties:
        id: { type: string, format: uuid }
        parkingLotId: { type: string, format: uuid }
        label: { type: string }
        section: { type: string }
        row: { type: string }
        index: { type: integer }
        slotIndex: { type: integer, nullable: true }
        distanceFromExit: { type: number, nullable: true }
        isAccessible: { type: boolean }
        currentStatus:
          type: string
          enum: [occupied, empty]
        updatedAt: { type: string, format: date-time }

    UpdateParkingSpotStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [occupied, empty]

    ParkingSpotLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        parkingSpotId: { type: string, format: uuid }
        status:
          type: string
          enum: [occupied, empty]
        recordedAt: { type: string, format: date-time }
        parkingSpot:
          type: object
          nullable: true
          properties:
            id: { type: string, format: uuid }
            label: { type: string }

    Course:
      type: object
      properties:
        id: { type: string, format: uuid }
        classCode: { type: string }
        startTime: { type: string }
        endTime: { type: string }
        name: { type: string, nullable: true }
        term: { type: string, nullable: true }
        building: { type: string, nullable: true }
        room: { type: string, nullable: true }
        sectionCode: { type: string, nullable: true }
        enrolled: { type: integer, nullable: true }
        capacity: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }

    ClassSchedule:
      type: object
      properties:
        id: { type: string, format: uuid }
        studentId: { type: string, format: uuid }
        classId: { type: string, format: uuid }
        term: { type: string, nullable: true }
        section: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    CreateClassSchedule:
      type: object
      required: [studentId, classId]
      properties:
        studentId: { type: string, format: uuid }
        classId: { type: string, format: uuid }
        term: { type: string, nullable: true }
        section: { type: string, nullable: true }

    ScheduleEntryWithCourse:
      type: object
      properties:
        id: { type: string, format: uuid }
        studentId: { type: string, format: uuid }
        classId: { type: string, format: uuid }
        term: { type: string, nullable: true }
        section: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        course:
          type: object
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Course"
        studentsEnrolled: { type: integer }

    Building:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        code: { type: string, nullable: true }
        floors: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }

    EventSize:
      type: string
      enum: [none, small, medium, large]

    DayArrivalPlanResponse:
      type: object
      required:
        - selectedDate
        - includedTermCodes
        - scheduleNote
        - gapMinutesAssumeLeftCampus
        - segments
        - assumptions
        - predictionMode
        - eventSize
        - forecastedAt
        - forecastHorizonMinutes
      properties:
        selectedDate: { type: string }
        includedTermCodes:
          type: array
          items: { type: string }
        scheduleNote: { type: string }
        gapMinutesAssumeLeftCampus: { type: integer }
        segments:
          type: array
          items:
            type: object
            description: Discriminated union (initial_arrival | stay_on_campus | return_and_park | no_parking_available)
        assumptions:
          type: object
          properties:
            walkMetersPerMinute: { type: number }
            minutesPerFloor: { type: number }
            congestionModel: { type: string }
        noClassesOnDay: { type: boolean }
        predictionMode:
          type: string
          enum: [current, predicted]
        eventSize: { $ref: "#/components/schemas/EventSize" }
        forecastedAt: { type: string, nullable: true }
        forecastHorizonMinutes: { type: integer, nullable: true }

    WhatIfLotResult:
      type: object
      properties:
        lotId: { type: string }
        lotName: { type: string }
        lotType: { type: string }
        baseline:
          type: object
          properties:
            occupancyPct: { type: number }
            freeSpots: { type: integer }
            confidence: { type: string }
        scenario:
          type: object
          properties:
            occupancyPct: { type: number }
            freeSpots: { type: integer }
            confidence: { type: string }
        delta:
          type: object
          properties:
            occupancyPct: { type: number }
            freeSpots: { type: integer }

    WhatIfResponse:
      type: object
      properties:
        date: { type: string }
        time: { type: string }
        dayOfWeek: { type: string }
        eventSize: { $ref: "#/components/schemas/EventSize" }
        useEnrollment: { type: boolean }
        targetAt: { type: string }
        lots:
          type: array
          items: { $ref: "#/components/schemas/WhatIfLotResult" }
        summary:
          type: object
          properties:
            totalBaselineFreeSpots: { type: integer }
            totalScenarioFreeSpots: { type: integer }
            totalCapacity: { type: integer }
            baselineOccupancyPct: { type: integer }
            scenarioOccupancyPct: { type: integer }
