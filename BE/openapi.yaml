openapi: 3.0.3
info:
  title: UNB Parking Digital Twin API
  description: Backend API for the UNB Saint John campus parking lot digital twin (MVP).
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Service and cache health checks.
  - name: Earth Engine
    description: Google Earth Engine imagery and map tiles.
  - name: Parking lots
    description: Parking lot metadata and capacities.
  - name: Parking spots
    description: Individual parking spots and their status.
  - name: Parking spot logs
    description: Time-series logs of parking spot status changes.
  - name: Historical
    description: Historical parking and sensor proxy data.
  - name: Students
    description: Student records for class scheduling demonstrations.
  - name: Classes
    description: Class/course catalog.
  - name: Class schedule
    description: Class schedule entries (enrollments).
  - name: Buildings
    description: Campus buildings and lot–building walking distances.
  - name: Users
    description: API users and auth-related endpoints.

paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /api/earth-engine/thumbnail:
    get:
      tags:
        - Earth Engine
      summary: Earth Engine image thumbnail (redirect to URL)
      operationId: getEarthEngineThumbnail
      parameters:
        - name: asset
          in: query
          required: true
          description: GEE asset ID (e.g. USGS/SRTMGL1_003)
          schema:
            type: string
        - name: dimensions
          in: query
          description: Width x height (default 512x512)
          schema:
            type: string
            default: "512x512"
        - name: format
          in: query
          description: png or jpg
          schema:
            type: string
            enum: [png, jpg]
            default: png
      responses:
        "302":
          description: Redirect to temporary thumbnail URL (PNG/JPG)
        "400":
          description: Missing asset
        "502":
          description: Earth Engine error

  /api/earth-engine/mapid:
    get:
      tags:
        - Earth Engine
      summary: Earth Engine map ID for tile overlay
      operationId: getEarthEngineMapId
      parameters:
        - name: asset
          in: query
          required: true
          description: GEE asset ID
          schema:
            type: string
        - name: min
          in: query
          schema:
            type: number
        - name: max
          in: query
          schema:
            type: number
      responses:
        "200":
          description: mapid and token for map tiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  mapid:
                    type: string
                  token:
                    type: string
        "400":
          description: Missing asset
        "502":
          description: Earth Engine error

  /api/earth-engine/tiles:
    get:
      tags:
        - Earth Engine
      summary: Earth Engine tile URL template for TileLayer
      description: Returns a URL template for map tiles. Use in TileLayer (e.g. Leaflet). Tiles are proxied through the backend; no token is exposed. Default asset "unbsj" is UNBSJ image + parking sections.
      operationId: getEarthEngineTileUrl
      parameters:
        - name: asset
          in: query
          description: Layer/asset (default unbsj)
          schema:
            type: string
            default: unbsj
      responses:
        "200":
          description: Tile URL template
          content:
            application/json:
              schema:
                type: object
                required: [tileUrl]
                properties:
                  tileUrl:
                    type: string
                    example: "/api/earth-engine/tiles/{z}/{x}/{y}?asset=unbsj"

  /api/earth-engine/tiles/{z}/{x}/{y}:
    get:
      tags:
        - Earth Engine
      summary: Earth Engine tile (proxied; mapid/token stay on server)
      description: Returns a single map tile image. Use as tile URL in map libraries so the client never sees GEE credentials. Optional auth middleware can be applied to this route.
      operationId: getEarthEngineTile
      parameters:
        - name: z
          in: path
          required: true
          description: Zoom level
          schema:
            type: integer
        - name: x
          in: path
          required: true
          description: Tile X
          schema:
            type: integer
        - name: y
          in: path
          required: true
          description: Tile Y
          schema:
            type: integer
        - name: asset
          in: query
          required: true
          description: GEE asset ID (e.g. USGS/SRTMGL1_003)
          schema:
            type: string
        - name: min
          in: query
          schema:
            type: number
        - name: max
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Tile image (PNG)
          content:
            image/png:
              schema:
                type: string
                format: binary
        "400":
          description: Missing asset or invalid z/x/y
        "502":
          description: Earth Engine error

  /api/parking-lots:
    get:
      tags:
        - Parking lots
      summary: List all parking lots (or lots with distance/occupancy for a building)
      operationId: listParkingLots
      parameters:
        - name: buildingId
          in: query
          description: When provided, returns lots with distance and occupancy for this building (sorted by distance then availability)
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of parking lots. With buildingId, each item includes distanceMeters, freeSpots, occupancyPercent.
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: "#/components/schemas/ParkingLot"
                    - $ref: "#/components/schemas/ParkingLotWithDistance"
    post:
      tags:
        - Parking lots
      summary: Create a parking lot
      operationId: createParkingLot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateParkingLot"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingLot"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/parking-lots/{id}:
    get:
      tags:
        - Parking lots
      summary: Get a parking lot by ID
      operationId: getParkingLotById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Parking lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingLot"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/parking-lots/{id}/spots:
    get:
      tags:
        - Parking lots
      summary: List spots for a parking lot
      operationId: listParkingLotSpots
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: section
          in: query
          description: Filter by section within the lot
          schema:
            type: string
      responses:
        "200":
          description: List of parking spots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingSpot"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/parking-spots:
    get:
      tags:
        - Parking spots
      summary: List parking spots
      operationId: listParkingSpots
      parameters:
        - name: parkingLotId
          in: query
          description: Filter by parking lot ID
          schema:
            type: string
            format: uuid
        - name: section
          in: query
          description: Filter by section within a lot (e.g. North, A, Visitor)
          schema:
            type: string
      responses:
        "200":
          description: List of parking spots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingSpot"
    post:
      tags:
        - Parking spots
      summary: Create a parking spot
      operationId: createParkingSpot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateParkingSpot"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpot"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/parking-spots/{id}:
    get:
      tags:
        - Parking spots
      summary: Get a parking spot by ID
      operationId: getParkingSpotById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Parking spot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpot"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/parking-spots/{id}/status:
    patch:
      tags:
        - Parking spots
      summary: Update parking spot status (occupied / empty)
      operationId: updateParkingSpotStatus
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateParkingSpotStatus"
      responses:
        "200":
          description: Updated parking spot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/parking-spot-logs:
    get:
      tags:
        - Parking spot logs
      summary: List parking spot status logs
      operationId: listParkingSpotLogs
      parameters:
        - name: parkingSpotId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of parking spot logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingSpotLog"

  /api/parking-spot-logs/{id}:
    get:
      tags:
        - Parking spot logs
      summary: Get a parking spot log by ID
      operationId: getParkingSpotLogById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Parking spot log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpotLog"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/historical:
    get:
      tags:
        - Historical
      summary: List historical proxy data
      operationId: listHistorical
      responses:
        "200":
          description: List of historical proxy records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoricalProxyData"
    post:
      tags:
        - Historical
      summary: Add historical proxy data (for model training)
      operationId: createHistorical
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHistorical"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoricalProxyData"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/students:
    get:
      tags:
        - Students
      summary: List all students
      operationId: listStudents
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      tags:
        - Students
      summary: Create a student
      operationId: createStudent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudent"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/students/{id}:
    get:
      tags:
        - Students
      summary: Get a student by ID
      operationId: getStudentById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/classes:
    get:
      tags:
        - Classes
      summary: List all classes (courses)
      operationId: listClasses
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      tags:
        - Classes
      summary: Create a class (course)
      operationId: createCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourse"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/classes/{id}:
    get:
      tags:
        - Classes
      summary: Get a class by ID
      operationId: getCourseById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Class (course)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/class-schedule:
    get:
      tags:
        - Class schedule
      summary: List class schedule entries (enrollments)
      operationId: listClassSchedule
      parameters:
        - name: studentId
          in: query
          schema:
            type: string
            format: uuid
        - name: classId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of class schedule entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassSchedule"
    post:
      tags:
        - Class schedule
      summary: Enroll a student in a class
      operationId: createClassSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassSchedule"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassSchedule"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/class-schedule/{id}:
    get:
      tags:
        - Class schedule
      summary: Get a class schedule entry by ID
      operationId: getClassScheduleById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Class schedule entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassSchedule"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Class schedule
      summary: Remove enrollment (drop class)
      operationId: deleteClassSchedule
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: No content
        "404":
          $ref: "#/components/responses/NotFound"

  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Log in (returns JWT)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid email or password

  /api/users:
    get:
      tags:
        - Users
      summary: List all users
      operationId: listUsers
      responses:
        "200":
          description: List of users (public fields only)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /api/users/me:
    get:
      tags:
        - Users
      summary: Get current user and linked student
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user with student profile if linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated

  /api/users/me/schedule:
    get:
      tags:
        - Users
      summary: Get class schedule for current user's student
      operationId: getMySchedule
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of class schedule entries (empty if no student linked)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassSchedule"
        "401":
          description: Not authenticated

  /api/users/{id}:
    get:
      tags:
        - Users
      summary: Get a user by ID
      operationId: getUserById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: User (public fields only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Users
      summary: Update a user
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUser"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Users
      summary: Delete a user
      operationId: deleteUser
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: No content
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Health:
      type: object
      properties:
        ok:
          type: boolean
        service:
          type: string
          example: unb-parking-twin-be

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          nullable: true

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          description: JWT for Authorization header

    MeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        student:
          nullable: true
          type: object
          properties:
            id:
              type: string
              format: uuid
            studentId:
              type: string
            email:
              type: string
            name:
              type: string
            year:
              type: integer
              nullable: true

    UpdateUser:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          nullable: true

    ParkingLot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        campus:
          type: string
          example: UNB Saint John
        capacity:
          type: integer
          minimum: 0
        imageUrl:
          type: string
          format: uri
          nullable: true
          description: Public URL of an image representing the parking lot
        createdAt:
          type: string
          format: date-time

    CreateParkingLot:
      type: object
      required:
        - name
        - capacity
      properties:
        name:
          type: string
          minLength: 1
        capacity:
          type: integer
          minimum: 0
        campus:
          type: string
        imageUrl:
          type: string
          format: uri
          nullable: true
          description: Public URL of an image representing the parking lot

    ParkingSpot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parkingLotId:
          type: string
          format: uuid
        label:
          type: string
        section:
          type: string
          description: Section within the lot (e.g. North, A, Visitor)
        row:
          type: string
        index:
          type: integer
        currentStatus:
          type: string
          enum: [occupied, empty]
        updatedAt:
          type: string
          format: date-time

    CreateParkingSpot:
      type: object
      required:
        - parkingLotId
        - label
      properties:
        parkingLotId:
          type: string
          format: uuid
        label:
          type: string
          minLength: 1
        section:
          type: string
          description: Section within the lot
        row:
          type: string
        index:
          type: integer
          minimum: 0

    UpdateParkingSpotStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [occupied, empty]

    ParkingSpotLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parkingSpotId:
          type: string
          format: uuid
        status:
          type: string
          enum: [occupied, empty]
        recordedAt:
          type: string
          format: date-time

    HistoricalProxyData:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sourceName:
          type: string
        recordedAt:
          type: string
          format: date-time
        occupancyPct:
          type: number
          minimum: 0
          maximum: 100
        snapshot:
          type: object
          nullable: true
        metadata:
          type: object
          nullable: true

    CreateHistorical:
      type: object
      required:
        - sourceName
        - occupancyPct
      properties:
        sourceName:
          type: string
          minLength: 1
        occupancyPct:
          type: number
          minimum: 0
          maximum: 100
        snapshot:
          type: object
          nullable: true
        metadata:
          type: object
          nullable: true

    Student:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        year:
          type: integer
          minimum: 1
          maximum: 10
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateStudent:
      type: object
      required:
        - studentId
        - email
        - name
      properties:
        studentId:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        year:
          type: integer
          minimum: 1
          maximum: 10
          nullable: true

    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        classCode:
          type: string
        startTime:
          type: string
