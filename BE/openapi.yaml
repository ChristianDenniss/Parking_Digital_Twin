openapi: 3.0.3
info:
  title: UNB Parking Digital Twin API
  description: >
    Backend API for the UNB Saint John campus parking lot digital twin (MVP).
    Includes user profiles (role, resident, accessible parking), JWT auth, class schedule,
    lot–building distances, and parking recommendation.
  version: 0.2.0

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Service and cache health checks.
  - name: Earth Engine
    description: Google Earth Engine imagery and map tiles.
  - name: Parking lots
    description: Parking lot metadata and capacities.
  - name: Parking spots
    description: Individual parking spots and their status.
  - name: Parking spot logs
    description: Time-series logs of parking spot status changes.
  - name: Historical
    description: Historical parking and sensor proxy data.
  - name: Students
    description: Student records for class scheduling demonstrations.
  - name: Classes
    description: Class/course catalog.
  - name: Class schedule
    description: Class schedule entries (enrollments).
  - name: Buildings
    description: Campus buildings and lot–building walking distances.
  - name: Users
    description: API users and auth-related endpoints.
  - name: Auth
    description: Registration and login (JWT).

paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /api/earth-engine/thumbnail:
    get:
      tags:
        - Earth Engine
      summary: Earth Engine image thumbnail (redirect to URL)
      operationId: getEarthEngineThumbnail
      parameters:
        - name: asset
          in: query
          required: true
          description: GEE asset ID (e.g. USGS/SRTMGL1_003)
          schema:
            type: string
        - name: dimensions
          in: query
          description: Width x height (default 512x512)
          schema:
            type: string
            default: "512x512"
        - name: format
          in: query
          description: png or jpg
          schema:
            type: string
            enum: [png, jpg]
            default: png
      responses:
        "302":
          description: Redirect to temporary thumbnail URL (PNG/JPG)
        "400":
          description: Missing asset
        "502":
          description: Earth Engine error

  /api/earth-engine/mapid:
    get:
      tags:
        - Earth Engine
      summary: Earth Engine map ID for tile overlay
      operationId: getEarthEngineMapId
      parameters:
        - name: asset
          in: query
          required: true
          description: GEE asset ID
          schema:
            type: string
        - name: min
          in: query
          schema:
            type: number
        - name: max
          in: query
          schema:
            type: number
      responses:
        "200":
          description: mapid and token for map tiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  mapid:
                    type: string
                  token:
                    type: string
        "400":
          description: Missing asset
        "502":
          description: Earth Engine error

  /api/earth-engine/tiles:
    get:
      tags:
        - Earth Engine
      summary: Earth Engine tile URL template for TileLayer
      description: Returns a URL template for map tiles. Use in TileLayer (e.g. Leaflet). Tiles are proxied through the backend; no token is exposed. Default asset "unbsj" is UNBSJ image + parking sections.
      operationId: getEarthEngineTileUrl
      parameters:
        - name: asset
          in: query
          description: Layer/asset (default unbsj)
          schema:
            type: string
            default: unbsj
      responses:
        "200":
          description: Tile URL template
          content:
            application/json:
              schema:
                type: object
                required: [tileUrl]
                properties:
                  tileUrl:
                    type: string
                    example: "/api/earth-engine/tiles/{z}/{x}/{y}?asset=unbsj"

  /api/earth-engine/tiles/{z}/{x}/{y}:
    get:
      tags:
        - Earth Engine
      summary: Earth Engine tile (proxied; mapid/token stay on server)
      description: Returns a single map tile image. Use as tile URL in map libraries so the client never sees GEE credentials. Optional auth middleware can be applied to this route.
      operationId: getEarthEngineTile
      parameters:
        - name: z
          in: path
          required: true
          description: Zoom level
          schema:
            type: integer
        - name: x
          in: path
          required: true
          description: Tile X
          schema:
            type: integer
        - name: y
          in: path
          required: true
          description: Tile Y
          schema:
            type: integer
        - name: asset
          in: query
          required: true
          description: GEE asset ID (e.g. USGS/SRTMGL1_003)
          schema:
            type: string
        - name: min
          in: query
          schema:
            type: number
        - name: max
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Tile image (PNG)
          content:
            image/png:
              schema:
                type: string
                format: binary
        "400":
          description: Missing asset or invalid z/x/y
        "502":
          description: Earth Engine error

  /api/parking-lots:
    get:
      tags:
        - Parking lots
      summary: List all parking lots (or lots with distance/occupancy for a building)
      operationId: listParkingLots
      parameters:
        - name: buildingId
          in: query
          description: When provided, returns lots with distance and occupancy for this building (sorted by distance then availability)
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of parking lots. With buildingId, each item includes distanceMeters, freeSpots, occupancyPercent.
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: "#/components/schemas/ParkingLot"
                    - $ref: "#/components/schemas/ParkingLotWithDistance"
    post:
      tags:
        - Parking lots
      summary: Create a parking lot
      operationId: createParkingLot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateParkingLot"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingLot"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/parking-lots/recommendation:
    post:
      tags:
        - Parking lots
      summary: Recommend closest lot with availability and a spot inside it
      description: >
        Picks the nearest lot to the given building that has at least one available spot (current or predicted),
        then returns the first suitable empty spot in that lot. Use stateMode "predicted" with optional override maps for future models.
      operationId: recommendParking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendParkingRequest"
      responses:
        "200":
          description: Recommended lot, spot, and metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingRecommendationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No suitable lot/spot for this building and state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/parking-lots/{id}:
    get:
      tags:
        - Parking lots
      summary: Get a parking lot by ID
      operationId: getParkingLotById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Parking lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingLot"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/parking-lots/{id}/spots:
    get:
      tags:
        - Parking lots
      summary: List spots for a parking lot
      operationId: listParkingLotSpots
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: section
          in: query
          description: Filter by section within the lot
          schema:
            type: string
      responses:
        "200":
          description: List of parking spots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingSpot"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/parking-spots:
    get:
      tags:
        - Parking spots
      summary: List parking spots
      operationId: listParkingSpots
      parameters:
        - name: parkingLotId
          in: query
          description: Filter by parking lot ID
          schema:
            type: string
            format: uuid
        - name: section
          in: query
          description: Filter by section within a lot (e.g. North, A, Visitor)
          schema:
            type: string
      responses:
        "200":
          description: List of parking spots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingSpot"
    post:
      tags:
        - Parking spots
      summary: Create a parking spot
      operationId: createParkingSpot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateParkingSpot"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpot"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/parking-spots/{id}:
    get:
      tags:
        - Parking spots
      summary: Get a parking spot by ID
      operationId: getParkingSpotById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Parking spot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpot"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/parking-spots/{id}/status:
    patch:
      tags:
        - Parking spots
      summary: Update parking spot status (occupied / empty)
      operationId: updateParkingSpotStatus
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateParkingSpotStatus"
      responses:
        "200":
          description: Updated parking spot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/parking-spot-logs:
    get:
      tags:
        - Parking spot logs
      summary: List parking spot status logs
      operationId: listParkingSpotLogs
      parameters:
        - name: parkingSpotId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of parking spot logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingSpotLog"

  /api/parking-spot-logs/{id}:
    get:
      tags:
        - Parking spot logs
      summary: Get a parking spot log by ID
      operationId: getParkingSpotLogById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Parking spot log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSpotLog"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/historical:
    get:
      tags:
        - Historical
      summary: List historical proxy data
      operationId: listHistorical
      responses:
        "200":
          description: List of historical proxy records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoricalProxyData"
    post:
      tags:
        - Historical
      summary: Add historical proxy data (for model training)
      operationId: createHistorical
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHistorical"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoricalProxyData"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/students:
    get:
      tags:
        - Students
      summary: List all students
      operationId: listStudents
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      tags:
        - Students
      summary: Create a student
      operationId: createStudent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudent"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/students/{id}:
    get:
      tags:
        - Students
      summary: Get a student by ID
      operationId: getStudentById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/classes:
    get:
      tags:
        - Classes
      summary: List all classes (courses)
      operationId: listClasses
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      tags:
        - Classes
      summary: Create a class (course)
      operationId: createCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourse"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/classes/{id}:
    get:
      tags:
        - Classes
      summary: Get a class by ID
      operationId: getCourseById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Class (course)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/class-schedule:
    get:
      tags:
        - Class schedule
      summary: List class schedule entries (enrollments)
      operationId: listClassSchedule
      parameters:
        - name: studentId
          in: query
          schema:
            type: string
            format: uuid
        - name: classId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of class schedule entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassSchedule"
    post:
      tags:
        - Class schedule
      summary: Enroll a student in a class
      operationId: createClassSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassSchedule"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassSchedule"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/class-schedule/{id}:
    get:
      tags:
        - Class schedule
      summary: Get a class schedule entry by ID
      operationId: getClassScheduleById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Class schedule entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassSchedule"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Class schedule
      summary: Remove enrollment (drop class)
      operationId: deleteClassSchedule
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: No content
        "404":
          $ref: "#/components/responses/NotFound"

  /api/buildings/distances/lot-building:
    get:
      tags:
        - Buildings
      summary: List lot–building distances (or get one by lot and building)
      operationId: listLotBuildingDistances
      parameters:
        - name: parkingLotId
          in: query
          description: Filter by parking lot. If both parkingLotId and buildingId are set, returns the single distance for that pair.
          schema:
            type: string
            format: uuid
        - name: buildingId
          in: query
          description: Filter by building. If both parkingLotId and buildingId are set, returns the single distance for that pair.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of lot–building distances (or single object when both query params provided). May include parkingLot and building relations.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LotBuildingDistance"
                  - type: array
                    items:
                      $ref: "#/components/schemas/LotBuildingDistance"
        "404":
          description: Single pair requested but not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Buildings
      summary: Create a lot–building distance
      operationId: createLotBuildingDistance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLotBuildingDistance"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LotBuildingDistance"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Distance for this lot and building already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags:
        - Buildings
      summary: Update a lot–building distance (by lot and building)
      operationId: updateLotBuildingDistance
      parameters:
        - name: parkingLotId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: buildingId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLotBuildingDistance"
      responses:
        "200":
          description: Updated distance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LotBuildingDistance"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Buildings
      summary: Remove a lot–building distance
      operationId: deleteLotBuildingDistance
      parameters:
        - name: parkingLotId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: buildingId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No content
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/buildings/{id}:
    get:
      tags:
        - Buildings
      summary: Get a building by ID
      operationId: getBuildingById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Building
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Building"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Buildings
      summary: Update a building
      operationId: updateBuilding
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBuilding"
      responses:
        "200":
          description: Updated building
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Building"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Buildings
      summary: Delete a building
      operationId: deleteBuilding
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: No content
        "404":
          $ref: "#/components/responses/NotFound"

  /api/buildings:
    get:
      tags:
        - Buildings
      summary: List all buildings
      operationId: listBuildings
      responses:
        "200":
          description: List of campus buildings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Building"
    post:
      tags:
        - Buildings
      summary: Create a building
      operationId: createBuilding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBuilding"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Building"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Log in (returns JWT)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid email or password

  /api/users:
    get:
      tags:
        - Users
      summary: List all users
      operationId: listUsers
      responses:
        "200":
          description: List of users (public fields only)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /api/users/me:
    get:
      tags:
        - Users
      summary: Get current user and linked student
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user with student profile if linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated
    patch:
      tags:
        - Users
      summary: Update current user profile (no password)
      description: >
        Update name, email, role, resident flag, accessible/disabled parking flag, and optionally link a student profile.
        Switching role to staff unlinks any linked student record. Switching to student or PhD candidate without a linked
        student requires `studentId` in the body. At least one field must be provided.
      operationId: patchMe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMeRequest"
      responses:
        "200":
          description: Updated user (same shape as GET /api/users/me)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Not authenticated
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users/me/schedule:
    get:
      tags:
        - Users
      summary: Get class schedule for current user's student
      operationId: getMySchedule
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of schedule entries with embedded course details (empty if no student linked)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleEntryWithCourse"
        "401":
          description: Not authenticated

  /api/users/{id}:
    get:
      tags:
        - Users
      summary: Get a user by ID
      operationId: getUserById
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: User (public fields only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Users
      summary: Update a user
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUser"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Users
      summary: Delete a user
      operationId: deleteUser
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: No content
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Health:
      type: object
      properties:
        ok:
          type: boolean
        service:
          type: string
          example: unb-parking-twin-be

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message

    UserRole:
      type: string
      description: Account type for parking eligibility
      enum:
        - staff
        - student
        - phd_candidate

    User:
      type: object
      description: Public user fields (no password hash)
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        role:
          $ref: "#/components/schemas/UserRole"
        resident:
          type: boolean
          description: Lives in UNBSJ campus residence (resident parking eligibility)
        disabled:
          type: boolean
          description: Requires an accessible / disabled parking stall when recommending spots

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          minLength: 1
          description: Full name (required)
        role:
          $ref: "#/components/schemas/UserRole"
          default: student
        resident:
          type: boolean
          default: false
        disabled:
          type: boolean
          default: false
          description: Accessible / disabled parking stall eligibility
        studentId:
          type: string
          description: Required when role is `student` or `phd_candidate` (omit for `staff`)

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          description: JWT for Authorization header

    MeResponse:
      description: Current user (public fields) plus linked student profile when present
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            student:
              nullable: true
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                studentId:
                  type: string
                email:
                  type: string
                name:
                  type: string
                year:
                  type: integer
                  nullable: true

    PatchMeRequest:
      type: object
      description: At least one property must be sent. Password cannot be changed here.
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/UserRole"
        resident:
          type: boolean
        disabled:
          type: boolean
        studentId:
          type: string
          description: >
            Required when your role is student or PhD candidate and no student profile is linked yet
            (e.g. after switching from staff).

    UpdateUser:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        resident:
          type: boolean
        disabled:
          type: boolean

    ParkingLot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        campus:
          type: string
          example: UNB Saint John
        capacity:
          type: integer
          minimum: 0
        imageUrl:
          type: string
          format: uri
          nullable: true
          description: Public URL of an image representing the parking lot
        createdAt:
          type: string
          format: date-time

    CreateParkingLot:
      type: object
      required:
        - name
        - capacity
      properties:
        name:
          type: string
          minLength: 1
        capacity:
          type: integer
          minimum: 0
        campus:
          type: string
        imageUrl:
          type: string
          format: uri
          nullable: true
          description: Public URL of an image representing the parking lot

    ParkingLotWithDistance:
      description: Parking lot with distance and occupancy when requested by building (e.g. GET /api/parking-lots?buildingId=...)
      allOf:
        - $ref: "#/components/schemas/ParkingLot"
        - type: object
          properties:
            distanceMeters:
              type: number
              description: Walking distance from the building to this lot (meters)
            freeSpots:
              type: integer
              description: Number of empty spots
            occupancyPercent:
              type: number
              minimum: 0
              maximum: 100
              description: Occupancy percentage

    RecommendParkingRequest:
      type: object
      required:
        - buildingId
      properties:
        buildingId:
          type: string
          format: uuid
        stateMode:
          type: string
          enum: [current, predicted]
          default: current
        predictedFreeSpotsByLotId:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
          description: Map of parking lot UUID to predicted free spot count (predicted mode)
        predictedSpotStatusByLotId:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: string
              enum: [empty, occupied]
          description: Map of lot UUID to map of spot UUID to predicted status

    ParkingRecommendationResponse:
      type: object
      properties:
        lot:
          $ref: "#/components/schemas/ParkingLot"
        spot:
          $ref: "#/components/schemas/ParkingSpot"
        distanceMeters:
          type: number
        freeSpotsInSelectedLot:
          type: integer
        evaluatedMode:
          type: string
          enum: [current, predicted]

    ParkingSpot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parkingLotId:
          type: string
          format: uuid
        label:
          type: string
        section:
          type: string
          description: Section within the lot (e.g. North, A, Visitor)
        row:
          type: string
        index:
          type: integer
        slotIndex:
          type: integer
          nullable: true
          description: 1-based order in the lot SVG for heat-map mapping
        currentStatus:
          type: string
          enum: [occupied, empty]
        updatedAt:
          type: string
          format: date-time

    CreateParkingSpot:
      type: object
      required:
        - parkingLotId
        - label
      properties:
        parkingLotId:
          type: string
          format: uuid
        label:
          type: string
          minLength: 1
        section:
          type: string
          description: Section within the lot
        row:
          type: string
        index:
          type: integer
          minimum: 0

    UpdateParkingSpotStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [occupied, empty]

    ParkingSpotLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parkingSpotId:
          type: string
          format: uuid
        status:
          type: string
          enum: [occupied, empty]
        recordedAt:
          type: string
          format: date-time

    HistoricalProxyData:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sourceName:
          type: string
        recordedAt:
          type: string
          format: date-time
        occupancyPct:
          type: number
          minimum: 0
          maximum: 100
        snapshot:
          type: object
          nullable: true
        metadata:
          type: object
          nullable: true

    CreateHistorical:
      type: object
      required:
        - sourceName
        - occupancyPct
      properties:
        sourceName:
          type: string
          minLength: 1
        occupancyPct:
          type: number
          minimum: 0
          maximum: 100
        snapshot:
          type: object
          nullable: true
        metadata:
          type: object
          nullable: true

    Student:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        year:
          type: integer
          minimum: 1
          maximum: 10
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateStudent:
      type: object
      required:
        - studentId
        - email
        - name
      properties:
        studentId:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        year:
          type: integer
          minimum: 1
          maximum: 10
          nullable: true

    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        classCode:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        name:
          type: string
          nullable: true
        term:
          type: string
          nullable: true
        building:
          type: string
          nullable: true
        room:
          type: string
          nullable: true
        sectionCode:
          type: string
          nullable: true
          description: Section identifier (e.g. SJ01B)
        enrolled:
          type: integer
          minimum: 0
          nullable: true
        capacity:
          type: integer
          minimum: 0
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateCourse:
      type: object
      required:
        - classCode
        - startTime
        - endTime
      properties:
        classCode:
          type: string
          minLength: 1
        startTime:
          type: string
          minLength: 1
        endTime:
          type: string
          minLength: 1
        name:
          type: string
          nullable: true
        term:
          type: string
          nullable: true
        building:
          type: string
          nullable: true
        room:
          type: string
          nullable: true
        sectionCode:
          type: string
          nullable: true
        enrolled:
          type: integer
          minimum: 0
          nullable: true
        capacity:
          type: integer
          minimum: 0
          nullable: true

    ClassSchedule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        classId:
          type: string
          format: uuid
        term:
          type: string
          nullable: true
        section:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    ScheduleEntryWithCourse:
      description: Class schedule entry with embedded course (used by GET /api/users/me/schedule)
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        classId:
          type: string
          format: uuid
        term:
          type: string
          nullable: true
        section:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        course:
          nullable: true
          $ref: "#/components/schemas/Course"
        studentsEnrolled:
          type: integer
          description: Count of students enrolled in this section

    CreateClassSchedule:
      type: object
      required:
        - studentId
        - classId
      properties:
        studentId:
          type: string
          format: uuid
        classId:
          type: string
          format: uuid
        term:
          type: string
          nullable: true
        section:
          type: string
          nullable: true

    Building:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
          nullable: true
          description: Optional code to match course.building (e.g. Ganong Hall)
        floors:
          type: integer
          minimum: 0
          nullable: true
          description: Number of floors
        createdAt:
          type: string
          format: date-time

    CreateBuilding:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        code:
          type: string
          nullable: true
        floors:
          type: integer
          minimum: 0
          nullable: true

    UpdateBuilding:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        code:
          type: string
          nullable: true
        floors:
          type: integer
          minimum: 0
          nullable: true

    LotBuildingDistance:
      type: object
      description: Walking distance (meters) between a parking lot and a building
      properties:
        parkingLotId:
          type: string
          format: uuid
        buildingId:
          type: string
          format: uuid
        distanceMeters:
          type: number
          minimum: 0
        parkingLot:
          oneOf:
            - $ref: "#/components/schemas/ParkingLot"
            - type: "null"
          description: Present when relation is loaded (e.g. list with filter)
        building:
          oneOf:
            - $ref: "#/components/schemas/Building"
            - type: "null"
          description: Present when relation is loaded

    CreateLotBuildingDistance:
      type: object
      required:
        - parkingLotId
        - buildingId
        - distanceMeters
      properties:
        parkingLotId:
          type: string
          format: uuid
        buildingId:
          type: string
          format: uuid
        distanceMeters:
          type: number
          minimum: 0

    UpdateLotBuildingDistance:
      type: object
      properties:
        distanceMeters:
          type: number
          minimum: 0
